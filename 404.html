<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Shashwata Roy</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<style>
  @font-face{font-family:'Poppins';font-weight:400;font-display:swap;src:url('/assets/fonts/poppins-400.woff2') format('woff2');}
  @font-face{font-family:'Poppins';font-weight:700;font-display:swap;src:url('/assets/fonts/poppins-700.woff2') format('woff2');}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Poppins',sans-serif;background:#EEECE4;color:#38301C;
    min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .box{background:#FDFCF6;padding:56px 48px;border-radius:8px;box-shadow:0 8px 40px rgba(56,48,28,.14);max-width:440px;}
  .code{font-size:64px;font-weight:700;color:#52579F;line-height:1}
  h1{font-size:22px;font-weight:700;margin:12px 0 8px}
  p{font-size:14px;color:#4A4230;line-height:1.5}
  a{display:inline-block;margin-top:24px;background:#52579F;color:#fff;text-decoration:none;
    padding:11px 22px;border-radius:999px;font-size:14px;font-weight:600;}
  a:hover{background:#464a8a}
</style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you’re looking for doesn’t exist or may have moved.</p>
    <a href="/">Back to home</a>
  </div>
</body>
</html>
